name: Build wheels

# Cross-platform wheel build for torch-strumpack across STRUMPACK backends
# (CPU / CUDA / ROCm). STRUMPACK is the heavy native dependency: it is built
# from source per backend (scripts/build_strumpack.sh), the nanobind binding
# wheel is built against it (STRUMPACK_DIR=...), then the STRUMPACK shared
# libs are bundled into the wheel (auditwheel on Linux, delvewheel on Windows).
#
# Because the maintainer cannot access PyPI, the publish job attaches every
# built wheel to the GitHub *Release* for the tag. Users then:
#   pip install https://github.com/sparsexlab/torch-strumpack/releases/download/<tag>/<wheel>
#
# Trigger: push a v* tag (attaches to that tag's Release), or run manually.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to attach wheels to (manual runs)"
        required: false
        default: "v0.0.1.dev0"

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------ #
  # CPU wheels — Linux manylinux_2_28 x86_64.                           #
  # Windows/macOS CPU are left as commented matrix entries below: they  #
  # need a BLAS/LAPACK + METIS toolchain that is non-trivial to land on #
  # those runners, so we ship Linux CPU first and grow from there.      #
  # ------------------------------------------------------------------ #
  cpu_linux:
    name: cpu / linux / py${{ matrix.python }}
    runs-on: ubuntu-22.04
    container: quay.io/pypa/manylinux_2_28_x86_64
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    env:
      STRUMPACK_BACKEND: cpu
      STRUMPACK_PREFIX: /opt/strumpack
      PY: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v4

      - name: Install native build deps (BLAS/LAPACK/METIS/Ninja)
        run: |
          set -e
          # manylinux_2_28 == AlmaLinux 8. EPEL provides metis + openblas.
          dnf install -y epel-release || yum install -y epel-release
          dnf install -y ninja-build gcc-gfortran cmake \
                          openblas-devel lapack-devel metis-devel || \
          yum install -y ninja-build gcc-gfortran cmake \
                          openblas-devel lapack-devel metis-devel

      - name: Build STRUMPACK (CPU)
        run: bash scripts/build_strumpack.sh

      - name: Select CPython ${{ matrix.python }}
        run: |
          set -e
          PYTAG="cp${PY/./}"
          PYBIN="$(ls -d /opt/python/${PYTAG}-${PYTAG}*/bin | head -1)"
          echo "PYBIN=$PYBIN" >> "$GITHUB_ENV"
          echo "$PYBIN" >> "$GITHUB_PATH"

      - name: Build + repair + tag wheel
        env:
          STRUMPACK_DIR: /opt/strumpack/lib/cmake/STRUMPACK
        run: bash scripts/ci_build_wheel.sh cpu

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-cpu-linux-py${{ matrix.python }}
          path: dist-final/*.whl

  # ------------------------------------------------------------------ #
  # CUDA wheels — Linux x86_64, cu12.x. STRUMPACK built with CUDA.      #
  # (Windows CUDA is a future matrix add: MSVC + nvcc + delvewheel.)    #
  # ------------------------------------------------------------------ #
  cuda_linux:
    name: cuda / linux / py${{ matrix.python }} / cu${{ matrix.cuda }}
    runs-on: ubuntu-22.04
    container: quay.io/pypa/manylinux_2_28_x86_64
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
        cuda: ["12.4"]   # cu12.x; covers torch>=2.4
    env:
      STRUMPACK_BACKEND: cuda
      STRUMPACK_PREFIX: /opt/strumpack
      CUDA_ARCHS: "70;80;89;90"
      PY: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v4

      - name: Install native build deps
        run: |
          set -e
          dnf install -y epel-release || yum install -y epel-release
          dnf install -y ninja-build gcc-gfortran cmake \
                          openblas-devel lapack-devel metis-devel || \
          yum install -y ninja-build gcc-gfortran cmake \
                          openblas-devel lapack-devel metis-devel

      - name: Install CUDA toolkit ${{ matrix.cuda }}
        run: |
          set -e
          CU="${{ matrix.cuda }}"
          dnf config-manager --add-repo \
            https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo
          dnf clean all
          dnf install -y "cuda-toolkit-${CU/./-}" || dnf install -y cuda-toolkit
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
          echo "CUDACXX=/usr/local/cuda/bin/nvcc" >> "$GITHUB_ENV"

      - name: Build STRUMPACK (CUDA)
        run: bash scripts/build_strumpack.sh

      - name: Select CPython ${{ matrix.python }}
        run: |
          set -e
          PYTAG="cp${PY/./}"
          PYBIN="$(ls -d /opt/python/${PYTAG}-${PYTAG}*/bin | head -1)"
          echo "PYBIN=$PYBIN" >> "$GITHUB_ENV"
          echo "$PYBIN" >> "$GITHUB_PATH"

      - name: Build + repair + tag wheel
        env:
          STRUMPACK_DIR: /opt/strumpack/lib/cmake/STRUMPACK
          # do NOT vendor the CUDA runtime into the wheel; the user supplies it
          AUDITWHEEL_EXCLUDE: "libcudart.so.12,libcublas.so.12,libcublasLt.so.12,libcusolver.so.11,libcusparse.so.12"
        run: bash scripts/ci_build_wheel.sh cuda12x

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-cuda-linux-py${{ matrix.python }}-cu${{ matrix.cuda }}
          path: dist-final/*.whl

  # ------------------------------------------------------------------ #
  # ROCm wheels — Linux x86_64. STRUMPACK built with HIP/rocSPARSE.     #
  # This is the key differentiator vs cuDSS. Built on the official      #
  # rocm/dev image so the HIP toolchain + roc* libs are already there.  #
  # ------------------------------------------------------------------ #
  rocm_linux:
    name: rocm / linux / py${{ matrix.python }}
    runs-on: ubuntu-22.04
    container: rocm/dev-ubuntu-22.04:6.2.4-complete
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    env:
      STRUMPACK_BACKEND: rocm
      STRUMPACK_PREFIX: /opt/strumpack
      ROCM_PATH: /opt/rocm
      HIP_ARCHS: "gfx90a;gfx942;gfx1100"
      PY: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v4

      - name: Install native build deps
        run: |
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            git cmake ninja-build gfortran \
            libopenblas-dev liblapack-dev libmetis-dev \
            python3-pip patchelf software-properties-common
          # rocsparse/rocsolver/hipblas come with the rocm *-complete image.

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build STRUMPACK (ROCm)
        run: bash scripts/build_strumpack.sh

      - name: Build + repair + tag wheel
        env:
          STRUMPACK_DIR: /opt/strumpack/lib/cmake/STRUMPACK
          PYBIN: ""   # use the setup-python interpreter (on PATH)
          AUDITWHEEL_PLAT: manylinux_2_35_x86_64   # rocm/dev image is ubuntu 22.04 (glibc 2.35)
          # don't vendor the ROCm runtime; the user supplies their ROCm install
          AUDITWHEEL_EXCLUDE: "libamdhip64.so.6,librocsparse.so.1,librocsolver.so.0,libhipblas.so.2,librocblas.so.4,libamd_comgr.so.2,libhsa-runtime64.so.1"
        run: bash scripts/ci_build_wheel.sh rocm6x

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-rocm-linux-py${{ matrix.python }}
          path: dist-final/*.whl

  # ================================================================== #
  # Windows / macOS CPU — DISABLED until the BLAS/LAPACK+METIS          #
  # toolchain is wired up. Kept here as the explicit next step rather   #
  # than a silently-missing target. To enable, add a job that:         #
  #   * installs OpenBLAS+METIS (vcpkg on Windows, brew on macOS),      #
  #   * runs scripts/build_strumpack.sh,                                #
  #   * builds the wheel and repairs with delvewheel / delocate.        #
  # ================================================================== #

  # ------------------------------------------------------------------ #
  # Publish: attach every built wheel to the tag's GitHub Release.      #
  # ------------------------------------------------------------------ #
  publish:
    name: Attach wheels to GitHub Release
    needs: [cpu_linux, cuda_linux, rocm_linux]
    if: always() && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to upload Release assets
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: List collected wheels
        run: ls -la dist || echo "no wheels were produced"

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach wheels to Release
        if: hashFiles('dist/*.whl') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*.whl
          fail_on_unmatched_files: false
