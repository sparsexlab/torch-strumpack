name: Build wheels

# Cross-platform wheel build for torch-strumpack across STRUMPACK backends
# (CPU / CUDA / ROCm). STRUMPACK is the heavy native dependency: it is built
# from source per backend (scripts/build_strumpack.sh), the nanobind binding
# wheel is built against it (STRUMPACK_DIR=...), then the STRUMPACK shared
# libs are bundled into the wheel (auditwheel on Linux, delvewheel on Windows).
#
# Because the maintainer cannot access PyPI, the publish job attaches every
# built wheel to the GitHub *Release* for the tag. Users then:
#   pip install https://github.com/sparsexlab/torch-strumpack/releases/download/<tag>/<wheel>
#
# Trigger: push a v* tag (attaches to that tag's Release), or run manually.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to attach wheels to (manual runs)"
        required: false
        default: "v0.0.1.dev0"

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------ #
  # CPU wheels — Linux manylinux_2_28 x86_64.                           #
  # Windows/macOS CPU are left as commented matrix entries below: they  #
  # need a BLAS/LAPACK + METIS toolchain that is non-trivial to land on #
  # those runners, so we ship Linux CPU first and grow from there.      #
  # ------------------------------------------------------------------ #
  cpu_linux:
    name: cpu / linux / py${{ matrix.python }}
    runs-on: ubuntu-22.04
    container: quay.io/pypa/manylinux_2_28_x86_64
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    env:
      STRUMPACK_BACKEND: cpu
      STRUMPACK_PREFIX: /opt/strumpack
      PY: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v4

      - name: Install native build deps (BLAS/LAPACK/METIS/Ninja)
        run: |
          set -e
          # manylinux_2_28 == AlmaLinux 8. EPEL provides metis + openblas.
          # NOTE: do NOT install EL8 `ninja-build` (1.8.2) — CMake's Ninja
          # generator needs Ninja >= 1.10 to build STRUMPACK's Fortran sources.
          # The pypa image already ships a modern ninja via pip (use that).
          dnf install -y epel-release || yum install -y epel-release
          dnf install -y gcc-gfortran cmake \
                          openblas-devel lapack-devel metis-devel || \
          yum install -y gcc-gfortran cmake \
                          openblas-devel lapack-devel metis-devel
          # modern ninja (>= 1.10) from PyPI, onto PATH for cmake -G Ninja
          /opt/python/cp312-cp312/bin/python -m pip install --upgrade ninja
          ln -sf /opt/python/cp312-cp312/bin/ninja /usr/local/bin/ninja
          ninja --version

      - name: Build STRUMPACK (CPU)
        run: bash scripts/build_strumpack.sh

      - name: Select CPython ${{ matrix.python }}
        run: |
          set -e
          PYTAG="cp${PY/./}"
          PYBIN="$(ls -d /opt/python/${PYTAG}-${PYTAG}*/bin | head -1)"
          echo "PYBIN=$PYBIN" >> "$GITHUB_ENV"
          echo "$PYBIN" >> "$GITHUB_PATH"

      - name: Build + repair + tag wheel
        env:
          STRUMPACK_DIR: /opt/strumpack/lib/cmake/STRUMPACK
          # Build the .cpu wheel against CPU torch so installing it into a
          # torch+cpu venv does NOT pull/replace it with a CUDA torch.
          TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu
        run: bash scripts/ci_build_wheel.sh cpu

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-cpu-linux-py${{ matrix.python }}
          path: dist-final/*.whl

  # ------------------------------------------------------------------ #
  # CUDA wheels — Linux x86_64, cu12.x. STRUMPACK built with CUDA.      #
  # (Windows CUDA is a future matrix add: MSVC + nvcc + delvewheel.)    #
  # ------------------------------------------------------------------ #
  cuda_linux:
    name: cuda / linux / py${{ matrix.python }} / cu${{ matrix.cuda }}
    runs-on: ubuntu-22.04
    container: quay.io/pypa/manylinux_2_28_x86_64
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        cuda: ["12.4"]   # cu12.x; covers torch>=2.4
    env:
      STRUMPACK_BACKEND: cuda
      STRUMPACK_PREFIX: /opt/strumpack
      CUDA_ARCHS: "70;80;89;90"
      PY: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v4

      - name: Install native build deps
        run: |
          set -e
          # See cpu_linux: EL8 ninja-build (1.8.2) is too old for STRUMPACK's
          # Fortran sources (CMake Ninja generator needs >= 1.10); use pip ninja.
          dnf install -y epel-release || yum install -y epel-release
          dnf install -y gcc-gfortran cmake \
                          openblas-devel lapack-devel metis-devel || \
          yum install -y gcc-gfortran cmake \
                          openblas-devel lapack-devel metis-devel
          /opt/python/cp312-cp312/bin/python -m pip install --upgrade ninja
          ln -sf /opt/python/cp312-cp312/bin/ninja /usr/local/bin/ninja
          ninja --version

      - name: Install CUDA toolkit ${{ matrix.cuda }}
        run: |
          set -e
          CU="${{ matrix.cuda }}"
          dnf config-manager --add-repo \
            https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo
          dnf clean all
          dnf install -y "cuda-toolkit-${CU/./-}" || dnf install -y cuda-toolkit
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
          echo "CUDACXX=/usr/local/cuda/bin/nvcc" >> "$GITHUB_ENV"
          # CUDA 12.4's nvcc rejects gcc > 13 ("unsupported GNU version"), but
          # the manylinux_2_28 image's default toolchain is gcc-toolset-14.
          # Install gcc-toolset-13 and pin nvcc's host compiler to it.
          dnf install -y gcc-toolset-13 gcc-toolset-13-gcc-gfortran || \
          yum install -y gcc-toolset-13 gcc-toolset-13-gcc-gfortran
          GT13=/opt/rh/gcc-toolset-13/root/usr/bin
          echo "CUDAHOSTCXX=$GT13/g++" >> "$GITHUB_ENV"
          # Build STRUMPACK's C/C++/Fortran with the gcc-13 toolset too, so the
          # CUDA device build and the host objects use a consistent compiler.
          echo "CC=$GT13/gcc" >> "$GITHUB_ENV"
          echo "CXX=$GT13/g++" >> "$GITHUB_ENV"
          echo "FC=$GT13/gfortran" >> "$GITHUB_ENV"
          echo "CMAKE_Fortran_COMPILER=$GT13/gfortran" >> "$GITHUB_ENV"

      - name: Build STRUMPACK (CUDA)
        run: bash scripts/build_strumpack.sh

      - name: Select CPython ${{ matrix.python }}
        run: |
          set -e
          PYTAG="cp${PY/./}"
          PYBIN="$(ls -d /opt/python/${PYTAG}-${PYTAG}*/bin | head -1)"
          echo "PYBIN=$PYBIN" >> "$GITHUB_ENV"
          echo "$PYBIN" >> "$GITHUB_PATH"

      - name: Build + repair + tag wheel
        env:
          STRUMPACK_DIR: /opt/strumpack/lib/cmake/STRUMPACK
          # do NOT vendor the CUDA runtime into the wheel; the user supplies it
          AUDITWHEEL_EXCLUDE: "libcudart.so.12,libcublas.so.12,libcublasLt.so.12,libcusolver.so.11,libcusparse.so.12"
        run: bash scripts/ci_build_wheel.sh cuda12x

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-cuda-linux-py${{ matrix.python }}-cu${{ matrix.cuda }}
          path: dist-final/*.whl

  # ------------------------------------------------------------------ #
  # ROCm wheels — Linux x86_64. STRUMPACK built with HIP/rocSPARSE.     #
  # This is the key differentiator vs cuDSS. Built on the official      #
  # rocm/dev image so the HIP toolchain + roc* libs are already there.  #
  # ------------------------------------------------------------------ #
  rocm_linux:
    name: rocm / linux / py${{ matrix.python }}
    runs-on: ubuntu-22.04
    # NOTE: use the SLIM base image (~1GB), not `-complete` (~5.5GB). The
    # complete image's ROCm math libs unpack to >30GB and overflow the
    # ubuntu-22.04 runner's root disk -> "no space left on device" at
    # container init (job never even starts). The base image ships the HIP
    # compiler + the ROCm apt repo, so we apt-install only the math/dev
    # libs STRUMPACK actually links (rocsparse/rocsolver/hipblas/rocblas).
    container: rocm/dev-ubuntu-22.04:6.2.4
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    env:
      STRUMPACK_BACKEND: rocm
      STRUMPACK_PREFIX: /opt/strumpack
      ROCM_PATH: /opt/rocm
      HIP_ARCHS: "gfx90a;gfx942;gfx1100"
      PY: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v4

      - name: Install native build deps
        run: |
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            git cmake ninja-build gfortran \
            libopenblas-dev liblapack-dev libmetis-dev \
            python3-pip patchelf software-properties-common
          # The base rocm/dev image has the HIP compiler + ROCm apt repo but
          # NOT the math libs, so pull the dev packages STRUMPACK's HIP build
          # links against (these are preinstalled only in the -complete image).
          apt-get install -y --no-install-recommends \
            rocsparse-dev rocsolver-dev hipblas-dev rocblas-dev hipsparse-dev \
            rocprim-dev rocthrust-dev hipcub-dev

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build STRUMPACK (ROCm)
        run: bash scripts/build_strumpack.sh

      - name: Build + repair + tag wheel
        env:
          STRUMPACK_DIR: /opt/strumpack/lib/cmake/STRUMPACK
          PYBIN: ""   # use the setup-python interpreter (on PATH)
          AUDITWHEEL_PLAT: manylinux_2_35_x86_64   # rocm/dev image is ubuntu 22.04 (glibc 2.35)
          # don't vendor the ROCm runtime; the user supplies their ROCm install
          AUDITWHEEL_EXCLUDE: "libamdhip64.so.6,librocsparse.so.1,librocsolver.so.0,libhipblas.so.2,librocblas.so.4,libamd_comgr.so.2,libhsa-runtime64.so.1"
        run: bash scripts/ci_build_wheel.sh rocm6x

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-rocm-linux-py${{ matrix.python }}
          path: dist-final/*.whl

  # ------------------------------------------------------------------ #
  # CPU wheels — macOS (arm64 macos-14 + x86_64 macos-13).              #
  # Homebrew supplies gcc (=> gfortran, which STRUMPACK hard-requires), #
  # openblas (BLAS+LAPACK) and metis. STRUMPACK is built no-MPI /       #
  # OpenMP-only, then delocate bundles the dylibs and stamps the        #
  # macosx_<ver>_<arch> platform tag so these wheels don't collide      #
  # with the linux cpu wheels as Release assets.                        #
  # ------------------------------------------------------------------ #
  cpu_macos:
    name: cpu / macos-${{ matrix.arch }} / py${{ matrix.python }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # full cross-product of {arm64 macos-14, x86_64 macos-13} x {py3.10..13}
        arch: [arm64, x86_64]
        python: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - { arch: arm64,  runner: macos-14, deployment: "14.0" }
          - { arch: x86_64, runner: macos-13, deployment: "13.0" }
    env:
      STRUMPACK_BACKEND: cpu
      STRUMPACK_PREFIX: ${{ github.workspace }}/strumpack-prefix
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment }}
      PY: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v4

      - name: Install native build deps (gcc/gfortran, openblas, metis, libomp, ninja)
        run: |
          set -e
          # libomp: STRUMPACK builds with OpenMP, so its installed CMake config
          # does find_dependency(OpenMP). The binding extension is compiled with
          # AppleClang, which needs Homebrew libomp to satisfy find_package(OpenMP)
          # (otherwise: "Could NOT find OpenMP_C / OpenMP_CXX").
          brew install gcc openblas metis libomp ninja cmake || true
          # surface the Homebrew gfortran for build_strumpack.sh autodetection
          ls -1 "$(brew --prefix)"/bin/gfortran* || true

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build STRUMPACK (CPU, no-MPI, OpenMP)
        run: bash scripts/build_strumpack.sh

      - name: Build + repair (delocate) + tag wheel
        env:
          STRUMPACK_DIR: ${{ github.workspace }}/strumpack-prefix/lib/cmake/STRUMPACK
          PYBIN: ""   # use the setup-python interpreter on PATH
          # Build the .cpu wheel against CPU torch (mac wheels are CPU-only).
          TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu
          # The python.org CPython from setup-python is a universal2 build, so
          # `build` would stamp the wheel `..._universal2`. But the extension is
          # single-arch (built on this runner), and delocate 0.13 hard-errors:
          # "Failed to find any binary with the required architecture: 'x86_64'".
          # Pin the wheel platform tag + compiler to this runner's arch so the
          # wheel is tagged macosx_<ver>_<arch> (arm64 / x86_64), not universal2.
          _PYTHON_HOST_PLATFORM: macosx-${{ matrix.deployment }}-${{ matrix.arch }}
          ARCHFLAGS: -arch ${{ matrix.arch }}
        run: bash scripts/ci_build_wheel.sh cpu

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-cpu-macos-${{ matrix.arch }}-py${{ matrix.python }}
          path: dist-final/*.whl

  # ================================================================== #
  # Windows CPU — DISABLED. STRUMPACK hard-requires a Fortran compiler  #
  # (project(STRUMPACK LANGUAGES CXX C Fortran) + bundled LAPACK .f     #
  # sources) and MSVC has none. Mixing a MinGW/Intel-Fortran STRUMPACK  #
  # with the MSVC-built nanobind extension + MSVC torch is an unsolved  #
  # ABI problem on the windows-2022 runner. A scaffold lives in         #
  # scripts/build_strumpack.ps1 / scripts/build_wheel.ps1 for whoever   #
  # lands a MinGW (or Intel oneAPI ifx) toolchain; re-enable then.      #
  #                                                                     #
  # # windows-cpu: STRUMPACK Fortran+METIS+BLAS via MSVC unresolved —   #
  # #              needs a MinGW (or Intel ifx) Fortran toolchain.      #
  # cpu_windows:                                                        #
  #   name: cpu / windows / py${{ matrix.python }}                      #
  #   runs-on: windows-2022                                             #
  #   strategy:                                                         #
  #     fail-fast: false                                                #
  #     matrix:                                                         #
  #       python: ["3.10", "3.11", "3.12", "3.13"]                      #
  #   env:                                                              #
  #     STRUMPACK_BACKEND: cpu                                          #
  #     STRUMPACK_PREFIX: ${{ github.workspace }}\strumpack-prefix      #
  #   steps:                                                            #
  #     - uses: actions/checkout@v4                                     #
  #     - name: Install BLAS/LAPACK + METIS (vcpkg)                     #
  #       run: vcpkg install openblas metis                             #
  #     - name: Setup Python                                            #
  #       uses: actions/setup-python@v5                                 #
  #       with: { python-version: "${{ matrix.python }}" }              #
  #     - name: Build STRUMPACK (CPU)                                   #
  #       run: pwsh scripts/build_strumpack.ps1                         #
  #     - name: Build + delvewheel + tag                                #
  #       run: pwsh scripts/build_wheel.ps1 cpu                         #
  #     - uses: actions/upload-artifact@v4                              #
  #       with:                                                         #
  #         name: wheel-cpu-windows-py${{ matrix.python }}              #
  #         path: dist-final/*.whl                                      #
  # ================================================================== #

  # ------------------------------------------------------------------ #
  # Publish: attach every built wheel to the tag's GitHub Release.      #
  # ------------------------------------------------------------------ #
  publish:
    name: Attach wheels to GitHub Release
    needs: [cpu_linux, cuda_linux, rocm_linux, cpu_macos]
    if: always() && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to upload Release assets
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: List collected wheels
        run: ls -la dist || echo "no wheels were produced"

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach wheels to Release
        if: hashFiles('dist/*.whl') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*.whl
          fail_on_unmatched_files: false
